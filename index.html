<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlmacénPro — Sistema de Gestión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #141720;
      --surface2:  #1c2030;
      --border:    #252a3a;
      --accent:    #4ade80;
      --accent2:   #22d3ee;
      --warn:      #f97316;
      --danger:    #f43f5e;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --radius:    10px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── LAYOUT ── */
    #app { display: grid; grid-template-rows: 64px 1fr; height: 100vh; }

    /* ── NAVBAR ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-right: 16px;
      white-space: nowrap;
    }
    .nav-brand span { color: var(--text); }

    .nav-group { display: flex; align-items: center; position: relative; }
    .nav-group-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 10px;
      cursor: default;
      user-select: none;
    }
    .nav-items { display: flex; gap: 2px; }
    .nav-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      background: transparent;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: rgba(74,222,128,.12); color: var(--accent); }

    .nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 8px; }
    .nav-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .status-dot.ok { background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── MAIN ── */
    main { overflow-y: auto; padding: 32px; }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 28px; }
    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
    }
    .page-header p { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* ── FORM ── */
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
    .form-group label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; font-family:'DM Mono',monospace; }
    .form-group input, .form-group textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 60px; }

    /* ── BUTTONS ── */
    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #0d0f14; }
    .btn-primary:hover { background: #86efac; }
    .btn-danger  { background: rgba(244,63,94,.15); color: var(--danger); border: 1px solid rgba(244,63,94,.3); }
    .btn-danger:hover { background: rgba(244,63,94,.25); }
    .btn-edit    { background: rgba(34,211,238,.1); color: var(--accent2); border: 1px solid rgba(34,211,238,.2); }
    .btn-edit:hover { background: rgba(34,211,238,.2); }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; }
    .btn-icon { padding: 5px 8px; }

    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead { background: var(--surface2); }
    thead th {
      padding: 10px 16px;
      text-align: left;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-weight: 500;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 11px 16px; color: var(--text); }
    .td-id { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); }
    .td-actions { display: flex; gap: 6px; }

    /* ── BADGE ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
    }
    .badge-green { background: rgba(74,222,128,.12); color: var(--accent); border: 1px solid rgba(74,222,128,.2); }
    .badge-blue  { background: rgba(34,211,238,.1); color: var(--accent2); border: 1px solid rgba(34,211,238,.2); }

    /* ── EMPTY / LOADING ── */
    .state-msg {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
    }
    .state-msg .icon { font-size: 2rem; display: block; margin-bottom: 8px; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      padding: 24px;
      transform: translateY(16px);
      transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; margin-bottom:16px; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(8px);
      transition: all .25s;
      z-index: 300;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok   { border-color: rgba(74,222,128,.4); color: var(--accent); }
    #toast.err  { border-color: rgba(244,63,94,.4);  color: var(--danger); }

    /* ── WELCOME ── */
    .welcome-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; margin-top: 24px; }
    .welcome-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all .2s;
    }
    .welcome-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .welcome-card .wc-icon { font-size: 1.8rem; margin-bottom: 10px; }
    .welcome-card .wc-name { font-family:'Syne',sans-serif; font-weight:600; font-size:.95rem; }
    .welcome-card .wc-desc { font-size:.78rem; color:var(--muted); margin-top:4px; }

    /* ── COMING SOON ── */
    .coming-soon {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 20px; gap: 12px;
    }
    .coming-soon .cs-icon { font-size: 3rem; }
    .coming-soon h2 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.3rem; }
    .coming-soon p { color: var(--muted); font-size:.875rem; text-align:center; max-width:360px; }

    @media(max-width:640px) {
      main { padding: 16px; }
      nav { padding: 0 12px; overflow-x: auto; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<div id="app">
  <nav>
    <div class="nav-brand">Almacén<span>Pro</span></div>

    <div class="nav-group">
      <span class="nav-group-label">Catálogos</span>
      <div class="nav-items">
        <button class="nav-btn" data-page="conceptos">Conceptos</button>
        <button class="nav-btn" data-page="destinos">Destinos</button>
        <button class="nav-btn" data-page="productos">Productos</button>
        <button class="nav-btn" data-page="unidades">Unidades</button>
      </div>
    </div>

    <div class="nav-sep"></div>

    <div class="nav-group">
      <span class="nav-group-label">Documentos</span>
      <div class="nav-items">
        <button class="nav-btn" data-page="entradas">Entradas</button>
        <button class="nav-btn" data-page="salidas">Salidas</button>
      </div>
    </div>

    <div class="nav-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">verificando…</span>
    </div>
  </nav>

  <main id="content"></main>
</div>

<!-- Modal genérico -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Editar registro</div>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modalSave">Guardar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ──────────────────────────────────────────────
// CONFIG
// ──────────────────────────────────────────────
const BASE = "/api";

// ──────────────────────────────────────────────
// TOAST
// ──────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = "ok") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "", 2800);
}

// ──────────────────────────────────────────────
// API HELPERS
// ──────────────────────────────────────────────
async function apiFetch(url, opts = {}) {
  const res = await fetch(BASE + url, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Error desconocido");
  return data;
}

// ──────────────────────────────────────────────
// MODAL
// ──────────────────────────────────────────────
function openModal(title, bodyHTML, onSave) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = bodyHTML;
  document.getElementById("modalSave").onclick = onSave;
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}
document.getElementById("modalOverlay").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ──────────────────────────────────────────────
// STATUS CHECK
// ──────────────────────────────────────────────
async function checkStatus() {
  try {
    await apiFetch("/health");
    document.getElementById("statusDot").className = "status-dot ok";
    document.getElementById("statusText").textContent = "BD conectada";
  } catch {
    document.getElementById("statusDot").className = "status-dot";
    document.getElementById("statusText").textContent = "Sin conexión";
  }
}

// ──────────────────────────────────────────────
// GENERIC CATALOG RENDERER
// ──────────────────────────────────────────────
function makeCatalogPage({ title, desc, endpoint, fields, columns, renderRow }) {
  return async function() {
    const content = document.getElementById("content");
    content.innerHTML = `
      <div class="page-header">
        <h1>${title}</h1>
        <p>${desc}</p>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Nuevo registro</span>
        </div>
        <div class="form-row" id="formRow">
          ${fields.map(f => `
            <div class="form-group">
              <label>${f.label}</label>
              <input type="${f.type||'text'}" id="field_${f.key}" placeholder="${f.placeholder||''}" step="${f.step||1}" />
            </div>
          `).join("")}
          <div class="form-group" style="justify-content:flex-end;min-width:auto">
            <label style="opacity:0">.</label>
            <button class="btn btn-primary" id="btnAdd">＋ Agregar</button>
          </div>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                ${columns.map(c=>`<th>${c}</th>`).join("")}
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="${columns.length+2}" class="state-msg"><span class="icon">⏳</span>Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;

    async function loadData() {
      try {
        const rows = await apiFetch(endpoint);
        const tbody = document.getElementById("tbody");
        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="${columns.length+2}" class="state-msg"><span class="icon">📭</span>Sin registros aún.</td></tr>`;
          return;
        }
        tbody.innerHTML = rows.map(r => `
          <tr>
            <td class="td-id">#${r.id}</td>
            ${renderRow(r)}
            <td>
              <div class="td-actions">
                <button class="btn btn-edit btn-sm" onclick="editRecord('${endpoint}',${r.id})">✏ Editar</button>
                <button class="btn btn-danger btn-sm" onclick="deleteRecord('${endpoint}',${r.id},loadCurrent)">✕</button>
              </div>
            </td>
          </tr>
        `).join("");
      } catch(err) {
        showToast("Error cargando datos: " + err.message, "err");
      }
    }

    document.getElementById("btnAdd").addEventListener("click", async () => {
      const body = {};
      fields.forEach(f => { body[f.key] = document.getElementById("field_"+f.key).value.trim(); });
      if (!body[fields[0].key]) return showToast("El campo " + fields[0].label + " es obligatorio", "err");
      try {
        await apiFetch(endpoint, { method:"POST", body:JSON.stringify(body) });
        fields.forEach(f => document.getElementById("field_"+f.key).value = "");
        showToast("✓ Registro agregado");
        loadData();
      } catch(err) { showToast(err.message, "err"); }
    });

    loadData();
    window._currentLoadFn = loadData;
  };
}

function loadCurrent() { if (window._currentLoadFn) window._currentLoadFn(); }

// ──────────────────────────────────────────────
// DELETE / EDIT GENERICS
// ──────────────────────────────────────────────
async function deleteRecord(endpoint, id, reloadFn) {
  if (!confirm("¿Eliminar este registro?")) return;
  try {
    await apiFetch(`${endpoint}/${id}`, { method:"DELETE" });
    showToast("✓ Eliminado");
    reloadFn();
  } catch(err) { showToast(err.message, "err"); }
}

async function editRecord(endpoint, id) {
  try {
    const rec = await apiFetch(`${endpoint}/${id}`);
    const allFields = Object.keys(rec).filter(k => k !== "id" && k !== "creado_en");
    const bodyHTML = allFields.map(k => `
      <div class="form-group" style="margin-bottom:12px">
        <label>${k.replace(/_/g," ")}</label>
        <input id="edit_${k}" value="${rec[k]??''}" />
      </div>
    `).join("");
    openModal("Editar registro #" + id, bodyHTML, async () => {
      const body = {};
      allFields.forEach(k => body[k] = document.getElementById("edit_"+k).value.trim());
      try {
        await apiFetch(`${endpoint}/${id}`, { method:"PUT", body:JSON.stringify(body) });
        showToast("✓ Actualizado");
        closeModal();
        loadCurrent();
      } catch(err) { showToast(err.message, "err"); }
    });
  } catch(err) { showToast(err.message, "err"); }
}

// ──────────────────────────────────────────────
// PAGES
// ──────────────────────────────────────────────
const pages = {

  home: async () => {
    document.getElementById("content").innerHTML = `
      <div class="page-header">
        <h1>Bienvenido a AlmacénPro</h1>
        <p>Selecciona un módulo del menú o haz clic en una tarjeta para comenzar.</p>
      </div>
      <div class="welcome-grid">
        ${[
          { page:"conceptos", icon:"📋", name:"Conceptos", desc:"Tipos de movimientos" },
          { page:"destinos",  icon:"📍", name:"Destinos",  desc:"Áreas y responsables" },
          { page:"productos", icon:"📦", name:"Productos", desc:"Inventario de artículos" },
          { page:"unidades",  icon:"📏", name:"Unidades",  desc:"Unidades de medida" },
          { page:"entradas",  icon:"⬇️", name:"Entradas",  desc:"Documentos de entrada" },
          { page:"salidas",   icon:"⬆️", name:"Salidas",   desc:"Documentos de salida" },
        ].map(c=>`
          <div class="welcome-card" onclick="navigate('${c.page}')">
            <div class="wc-icon">${c.icon}</div>
            <div class="wc-name">${c.name}</div>
            <div class="wc-desc">${c.desc}</div>
          </div>
        `).join("")}
      </div>
    `;
  },

  conceptos: makeCatalogPage({
    title: "Catálogo de Conceptos",
    desc: "Tipos o motivos de movimientos de almacén.",
    endpoint: "/conceptos",
    fields: [
      { key:"nombre",      label:"Nombre",      placeholder:"Ej. Compra directa" },
      { key:"descripcion", label:"Descripción",  placeholder:"Detalle del concepto" },
    ],
    columns: ["Nombre", "Descripción", "Creado"],
    renderRow: r => `
      <td>${r.nombre}</td>
      <td>${r.descripcion||'—'}</td>
      <td class="td-id">${new Date(r.creado_en).toLocaleDateString('es-MX')}</td>
    `,
  }),

  destinos: makeCatalogPage({
    title: "Catálogo de Destinos",
    desc: "Áreas, departamentos o ubicaciones del almacén.",
    endpoint: "/destinos",
    fields: [
      { key:"nombre",       label:"Nombre",       placeholder:"Ej. Bodega Norte" },
      { key:"direccion",    label:"Dirección",     placeholder:"Ubicación física" },
      { key:"responsable",  label:"Responsable",   placeholder:"Nombre del responsable" },
    ],
    columns: ["Nombre", "Dirección", "Responsable", "Creado"],
    renderRow: r => `
      <td>${r.nombre}</td>
      <td>${r.direccion||'—'}</td>
      <td>${r.responsable||'—'}</td>
      <td class="td-id">${new Date(r.creado_en).toLocaleDateString('es-MX')}</td>
    `,
  }),

  productos: makeCatalogPage({
    title: "Catálogo de Productos",
    desc: "Artículos e insumos gestionados en el almacén.",
    endpoint: "/productos",
    fields: [
      { key:"nombre",      label:"Nombre",      placeholder:"Nombre del producto" },
      { key:"descripcion", label:"Descripción",  placeholder:"Detalle" },
      { key:"precio",      label:"Precio ($)",   type:"number", step:"0.01", placeholder:"0.00" },
      { key:"stock",       label:"Stock",        type:"number", placeholder:"0" },
    ],
    columns: ["Nombre", "Precio", "Stock", "Creado"],
    renderRow: r => `
      <td>${r.nombre}</td>
      <td><span class="badge badge-green">$${parseFloat(r.precio||0).toFixed(2)}</span></td>
      <td><span class="badge badge-blue">${r.stock} uds</span></td>
      <td class="td-id">${new Date(r.creado_en).toLocaleDateString('es-MX')}</td>
    `,
  }),

  unidades: makeCatalogPage({
    title: "Catálogo de Unidades de Medida",
    desc: "Unidades utilizadas para cuantificar los productos.",
    endpoint: "/unidades",
    fields: [
      { key:"nombre",       label:"Nombre",       placeholder:"Ej. Kilogramo" },
      { key:"abreviatura",  label:"Abreviatura",  placeholder:"Ej. kg" },
    ],
    columns: ["Nombre", "Abreviatura", "Creado"],
    renderRow: r => `
      <td>${r.nombre}</td>
      <td><span class="badge badge-blue">${r.abreviatura}</span></td>
      <td class="td-id">${new Date(r.creado_en).toLocaleDateString('es-MX')}</td>
    `,
  }),

  entradas: async () => {
    document.getElementById("content").innerHTML = `
      <div class="page-header"><h1>Documentos de Entrada</h1></div>
      <div class="coming-soon">
        <span class="cs-icon">⬇️</span>
        <h2>Módulo en desarrollo</h2>
        <p>Las entradas de almacén estarán disponibles próximamente. Por ahora, gestiona tus catálogos para preparar los datos maestros.</p>
      </div>`;
  },

  salidas: async () => {
    document.getElementById("content").innerHTML = `
      <div class="page-header"><h1>Documentos de Salida</h1></div>
      <div class="coming-soon">
        <span class="cs-icon">⬆️</span>
        <h2>Módulo en desarrollo</h2>
        <p>Las salidas de almacén estarán disponibles próximamente. Por ahora, gestiona tus catálogos para preparar los datos maestros.</p>
      </div>`;
  },
};

// ──────────────────────────────────────────────
// ROUTER (SPA)
// ──────────────────────────────────────────────
let current = null;

function navigate(page) {
  if (!pages[page]) page = "home";
  current = page;

  // Actualizar navbar
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.page === page);
  });

  // Actualizar URL sin reload
  history.pushState({ page }, "", page === "home" ? "/" : `/${page}`);

  // Renderizar página
  pages[page]();
}

// Leer URL inicial
function getInitialPage() {
  const p = location.pathname.replace("/","").trim();
  return pages[p] ? p : "home";
}

document.querySelectorAll(".nav-btn[data-page]").forEach(btn => {
  btn.addEventListener("click", () => navigate(btn.dataset.page));
});

window.addEventListener("popstate", (e) => {
  navigate(e.state?.page || getInitialPage());
});

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
navigate(getInitialPage());
checkStatus();
setInterval(checkStatus, 30000);
</script>
